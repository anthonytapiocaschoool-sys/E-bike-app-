<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">

<title>E-Bike Dash</title>

<style>
body{
margin:0;
background:radial-gradient(circle,#111,#000);
color:#00ffcc;
font-family:Arial;
overflow:hidden;
}

.center{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.speed{
font-size:120px;
text-shadow:0 0 20px #00ffcc;
}

.unit{
color:#777;
margin-top:-10px;
}

.bottom{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-around;
color:#fff;
font-size:14px;
}

.small{font-size:11px;color:#777}

button{
padding:14px 20px;
background:#00ffcc;
border:0;
border-radius:10px;
font-weight:bold;
margin-top:20px;
}
</style>
</head>

<body>

<div class="center">
<div class="speed" id="speed">0</div>
<div class="unit">km/h</div>
<button onclick="start()">Start Ride</button>
</div>

<div class="bottom">
<div>
<div id="miles">0.00</div>
<div class="small">Miles</div>
</div>

<div>
<div id="avg">0</div>
<div class="small">AVG</div>
</div>

<div>
<div id="max">0</div>
<div class="small">MAX</div>
</div>
</div>

<script>

let last=null;
let lastTime=null;
let speeds=[];
let kmTotal=0;

function start(){

navigator.geolocation.watchPosition(p=>{

let lat=p.coords.latitude;
let lon=p.coords.longitude;
let now=Date.now();

let speed=0;

if(last && lastTime){

let d=distance(last,{lat,lon});
let t=(now-lastTime)/1000;

/* filter bad GPS jumps */
if(d<0.03 && t>0.5){
speed=(d/t)*3600;
kmTotal+=d;
}

}

/* update state */
last={lat,lon};
lastTime=now;

/* smoothing */
speeds.push(speed);
if(speeds.length>6)speeds.shift();

let avg=speeds.reduce((a,b)=>a+b,0)/speeds.length;
let max=Math.max(...speeds);

/* display */
document.getElementById("speed").innerText=avg.toFixed(1);
document.getElementById("avg").innerText=avg.toFixed(1);
document.getElementById("max").innerText=max.toFixed(1);
document.getElementById("miles").innerText=(kmTotal*0.621371).toFixed(2);

},{enableHighAccuracy:true,maximumAge:0,timeout:5000});

}

function distance(a,b){
const R=6371;
let dLat=(b.lat-a.lat)*Math.PI/180;
let dLon=(b.lon-a.lon)*Math.PI/180;

let x=
Math.sin(dLat/2)**2+
Math.cos(a.lat*Math.PI/180)*
Math.cos(b.lat*Math.PI/180)*
Math.sin(dLon/2)**2;

return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

</script>

</body>
</html>
