<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>E-Bike Dash</title>

<style>
body{
margin:0;
background:radial-gradient(circle at center,#111,#000);
color:#00ffcc;
font-family:Arial;
overflow:hidden;
}

.center{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.speed{
font-size:120px;
}

.small{color:#777}
</style>
</head>

<body>

<div class="center">
<div class="speed" id="speed">0</div>
<div class="small">km/h</div>
</div>

<script>

let last=null;
let lastTime=null;
let kmTotal=0;
let speeds=[];

let gpsStarted=false;

/* AUTO START CHECK */
window.onload=()=>{

let granted=localStorage.getItem("gps_ok");

if(granted==="yes"){
startGPS();
}else{
requestStart();
}

};

function requestStart(){

navigator.geolocation.getCurrentPosition(()=>{
localStorage.setItem("gps_ok","yes");
startGPS();
},()=>{
alert("Please allow location access to use speedometer");
});

}

/* MAIN GPS LOOP */
function startGPS(){

if(gpsStarted)return;
gpsStarted=true;

navigator.geolocation.watchPosition(pos=>{

let lat=pos.coords.latitude;
let lon=pos.coords.longitude;
let now=Date.now();

let speed=0;

if(last && lastTime){

let d=dist(last,{lat,lon});
let t=(now-lastTime)/1000;

if(d<0.03 && t>0.5){
speed=(d/t)*3600;
kmTotal+=d;
}

}

last={lat,lon};
lastTime=now;

/* smoothing */
speeds.push(speed);
if(speeds.length>5)speeds.shift();

let avg=speeds.reduce((a,b)=>a+b,0)/speeds.length;

/* display */
document.getElementById("speed").innerText=avg.toFixed(1);

},{enableHighAccuracy:true,maximumAge:0});

}

/* DISTANCE */
function dist(a,b){
const R=6371;
let dLat=(b.lat-a.lat)*Math.PI/180;
let dLon=(b.lon-a.lon)*Math.PI/180;

let x=
Math.sin(dLat/2)**2+
Math.cos(a.lat*Math.PI/180)*
Math.cos(b.lat*Math.PI/180)*
Math.sin(dLon/2)**2;

return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

</script>

</body>
</html>
